
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caça ao Rato!</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Tente pegar o rato! 🐭</h1>
    
    <div class="area" id="area">
        <span id="rato-emoji" style="font-size: 50px;">🐭</span>
<!--A tag <span> no HTML serve para agrupar e aplicar estilos (CSS) ou manipular partes específicas de texto ou elementos em linha (inline), sem quebrar o fluxo do layout. Diferente da <div>, ela não pula linha, tornando-a ideal para destacar palavras, mudar cores ou manipular textos pequenos dentro de parágrafos.   -->
        <p class="mensagem" id="mensagem">Passe o mouse para começar!</p>
    </div>

    <p id="resultado"></p>

    <hr>
    <script src="script.js"></script>
</body>
